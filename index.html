<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSK Portfolio Pro Max</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --green: #00ffa3; --red: #ff4d4d; --gold: #f3ba2f; --bg: #0a0a0a; --card: #161616; --border: #2d2d2d; --text-main: #ffffff; --text-sub: #888888; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 15px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 480px; margin: auto; }
        .card { background: var(--card); padding: 22px; border-radius: 28px; margin-bottom: 12px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .label { font-size: 0.7rem; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .value { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 10px; }
        .sub-value { font-size: 1.1rem; font-weight: 700; }
        
        /* Progress Bar Styles */
        .progress-container { background: #262626; height: 10px; border-radius: 10px; margin: 15px 0 8px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #00ffa3, #00c853); height: 100%; width: 0%; transition: 1.5s ease-out; }
        .goal-10k-box { margin-top: 15px; padding-top: 12px; border-top: 1px solid #222; }
        .mini-bar-bg { background: #222; height: 6px; border-radius: 3px; overflow: hidden; margin: 8px 0; }
        .mini-bar-fill { background: var(--gold); height: 100%; width: 0%; transition: 2s; }
        
        #chart-wrapper { width: 100%; height: 200px; margin-top: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 0; border-top: 1px solid #222; }
        .btn { background: var(--green); color: #000; text-decoration: none; display: block; padding: 18px; border-radius: 22px; text-align: center; font-weight: 800; margin-top: 15px; }
        .up { color: var(--green); } .down { color: var(--red); }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin: 10px 5px 20px;">
        <h2 style="font-size: 1.1rem; margin:0; letter-spacing: 1px;">HSK PORTFOLIO</h2>
        <div id="status" style="font-size: 0.6rem; color: var(--text-sub); background: #222; padding: 2px 8px; border-radius: 4px;">Syncing...</div>
    </div>
    
    <div class="card">
        <div class="label">Tổng tích lũy</div>
        <div id="totalHSK" class="value">0 HSK</div>

        <div class="progress-container"><div id="prog" class="progress-bar"></div></div>
        <div style="display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: bold; margin-bottom: 15px;">
            <span id="percent" style="color:var(--green)">0%</span>
            <span id="milestoneLabel" style="color: var(--text-sub);">Mục tiêu: -- HSK</span>
        </div>

        <div id="chart-wrapper"><canvas id="mainChart"></canvas></div>

        <div class="goal-10k-box">
            <div style="display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 800; color: var(--gold);">
                <span>TIẾN TRÌNH 10,000 HSK</span>
                <span id="totalPercent">0%</span>
            </div>
            <div class="mini-bar-bg"><div id="totalProgBar" class="mini-bar-fill"></div></div>
            <div id="neededText" style="font-size: 0.65rem; color: var(--text-sub); text-align: center; margin-top: 5px;">--</div>
        </div>
    </div>

    <div class="grid">
        <div class="card" style="padding: 15px;">
            <div class="label">Giá Gate.io</div>
            <div id="livePrice" style="color:var(--gold); font-size: 1.2rem; font-weight: 800;">--</div>
        </div>
        <div class="card" style="padding: 15px;">
            <div class="label">Hòa Vốn</div>
            <div id="avgPrice" style="font-size: 1.2rem; font-weight: 800;">--</div>
        </div>
    </div>

    <div class="card">
        <div class="label" style="margin-bottom: 10px;">Lịch sử giao dịch</div>
        <table id="historyTable"><tbody></tbody></table>
    </div>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSc7GeWNPdL2V6jAfS8lXqTmwloI6wana9dyf0JvnZE2lj4JEw/viewform?usp=header" target="_blank" class="btn">THÊM GIAO DỊCH</a>
</div>

<script>
const SHEET_ID = '13aMMI3eTsSfglI_4hOizVreKE_x1_mFTmierAQAkCqE';
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
let mainChart;

function parseNum(val) {
    if (!val) return 0;
    let n = parseFloat(val.toString().replace(/,/g, '.').replace(/[^0-9.]/g, '')) || 0;
    return n > 100 ? n / 10000 : n;
}

function renderChart(labels, buyPrices, livePrice, volumes) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (mainChart) mainChart.destroy();
    mainChart = new Chart(ctx, {
        data: {
            labels: labels,
            datasets: [
                { type: 'line', label: 'Giá Mua', data: buyPrices, borderColor: '#f3ba2f', borderWidth: 2, pointRadius: 2, tension: 0.3, yAxisID: 'y' },
                { type: 'line', label: 'Giá Live', data: Array(labels.length).fill(livePrice), borderColor: '#00ffa3', borderDash: [5, 5], borderWidth: 1, pointRadius: 0, yAxisID: 'y' },
                { type: 'bar', label: 'SL', data: volumes, backgroundColor: 'rgba(255, 255, 255, 0.08)', yAxisID: 'y1', barThickness: 12 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { display: true, position: 'left', grid: { color: '#222' }, ticks: { color: '#666', font: { size: 8 } } },
                y1: { display: false, position: 'right' },
                x: { ticks: { color: '#444', font: { size: 8 } }, grid: { display: false } }
            }
        }
    });
}

async function updateDashboard() {
    try {
        let livePrice = 0.1750;
        try {
            const res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.gateio.ws/api/v4/spot/tickers?currency_pair=HSK_USDT'));
            const data = await res.json();
            livePrice = parseFloat(JSON.parse(data.contents)[0].last);
        } catch (e) {}
        document.getElementById('livePrice').innerText = livePrice.toFixed(4);

        const resSheet = await fetch(`${URL}&t=${Date.now()}`);
        const csvText = await resSheet.text();
        const lines = csvText.split(/\r?\n/).map(line => line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/"/g, '').trim()));
        
        const qtyIdx = lines[0].findIndex(h => h.includes("Số lượng HSK mua"));
        const priceIdx = lines[0].findIndex(h => h.includes("Đơn giá (USDT/HSK)"));
        
        let totalHSK = 0, totalCost = 0, historyHTML = '';
        let labels = [], buyPrices = [], volumes = [];

        for (let i = 1; i < lines.length; i++) {
            const row = lines[i];
            if (!row[qtyIdx]) continue;
            const qty = Math.round(parseNum(row[qtyIdx]));
            const p = parseNum(row[priceIdx]);
            const date = row[0] ? row[0].split(' ')[0] : i;

            if (qty > 0) {
                totalHSK += qty;
                totalCost += (qty * p);
                labels.push(date);
                buyPrices.push(p);
                volumes.push(qty);
                
                const diff = p > 0 ? ((livePrice - p) / p * 100).toFixed(1) : 0;
                historyHTML = `<tr><td><div class="label">${date}</div><b>${qty.toLocaleString()} HSK</b></td><td style="text-align:right;"><div class="label">Giá: ${p.toFixed(4)}</div><span class="${diff>=0?'up':'down'}">${diff>=0?'▲':'▼'} ${Math.abs(diff)}%</span></td></tr>` + historyHTML;
            }
        }

        // Cập nhật các con số chính
        document.getElementById('totalHSK').innerText = totalHSK.toLocaleString() + " HSK";
        document.getElementById('avgPrice').innerText = (totalCost/totalHSK || 0).toFixed(4);
        
        // Tính toán Tiến trình & Milestone
        const milestones = [500, 1000, 2500, 5000, 10000];
        const nextM = milestones.find(m => m > totalHSK) || 10000;
        
        document.getElementById('prog').style.width = Math.min((totalHSK/nextM)*100, 100) + "%";
        document.getElementById('percent').innerText = ((totalHSK/nextM)*100).toFixed(1) + "%";
        document.getElementById('milestoneLabel').innerText = "Mục tiêu: " + nextM.toLocaleString() + " HSK";
        
        document.getElementById('totalProgBar').style.width = Math.min((totalHSK/10000)*100, 100) + "%";
        document.getElementById('totalPercent').innerText = ((totalHSK/10000)*100).toFixed(1) + "%";
        
        const remain = 10000 - totalHSK;
        document.getElementById('neededText').innerText = remain > 0 ? `Cần thêm ${remain.toLocaleString()} HSK nữa để đạt 10K` : "🎯 ĐÃ HOÀN THÀNH MỤC TIÊU 10,000 HSK!";

        renderChart(labels, buyPrices, livePrice, volumes);
        document.getElementById('historyTable').querySelector('tbody').innerHTML = historyHTML;
        document.getElementById('status').innerText = "Live: OK (" + new Date().toLocaleTimeString() + ")";
    } catch (e) { document.getElementById('status').innerText = "Lỗi!"; }
}
updateDashboard();
setInterval(updateDashboard, 30000);
</script>
</body>
</html>
